# ReLoop reverse proxy.
# Copy to /etc/nginx/sites-available/reloop, symlink into sites-enabled,
# replace SERVER_NAME_PLACEHOLDER with e.g. 12-34-56-78.sslip.io,
# then run: sudo certbot --nginx -d <that-host>  (adds the 443 block + redirect).
server {
    listen 80;
    server_name SERVER_NAME_PLACEHOLDER;

    client_max_body_size 20m;  # allow return-photo / video uploads

    # Browser-facing WebSocket for live YOLO vision-stream -> FastAPI :8000
    location /vision-stream {
        proxy_pass http://127.0.0.1:8000/vision-stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;   # preserved for ALLOWED_ORIGINS check
        proxy_read_timeout 3600s;               # keep long-lived socket open
        proxy_send_timeout 3600s;
    }

    # Everything else -> Next.js :3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
